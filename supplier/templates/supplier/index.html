{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="px-6 py-4 flex items-center justify-between border-b border-gray-200">
    <p class="text-xs text-gray-400 uppercase tracking-widest">Suppliers</p>
    <div class="relative">
        <button class="px-4 py-1.5 text-sm rounded-lg bg-gray-900 hover:bg-gray-700 text-white transition-colors font-medium" onclick="addSupplier()">
            Add Supplier
        </button>

        <div id="addSupplierDiv" class="hidden z-20 absolute top-8 right-0 rounded-lg shadow-md bg-white p-4 w-64">
            <form action="/suppliers/add/" method="POST">
                {% csrf_token %}
                <label for="supplierName" class="text-sm font-medium">Name:</label>
                <input type="text" id="supplierName" name="supplierName" class="border rounded px-2 py-1 text-sm w-full mt-1">
                <div class="flex gap-2 mt-2">
                    <input type="submit" value="Add" class="px-3 py-1 text-sm bg-gray-900 text-white rounded-lg cursor-pointer hover:bg-gray-700">
                    <button type="button" onclick="cancelSupplier()" class="px-2 py-1 text-sm text-gray-500 hover:text-red-500">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="flex flex-wrap gap-3 p-6">
    {% for supplier in suppliers %}
    <div class="relative group">
        <a href="{% url 'single' supplier.id %}" class="flex flex-col gap-1 p-4 rounded-lg border border-gray-200 hover:border-gray-400 hover:shadow-sm transition-all bg-white min-w-[160px]">
            <span class="text-sm font-semibold text-gray-800">{{ supplier.name }}</span>
            {% if supplier.balance > 0 %}
                <span class="text-xs font-mono text-red-500">-{{ supplier.balance }}€</span>
            {% else %}
                <span class="text-xs font-mono text-gray-400">0€</span>
            {% endif %}
        </a>
        <form action="{% url 'delete_supplier' supplier.id %}" method="POST" class="delete-supplier-form">
            {% csrf_token %}
            <button type="button" onclick="confirmDelete(this)" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                <i class="fa-regular fa-trash-can"></i>
            </button>
        </form>
    </div>
    {% endfor %}
</div>

{% endblock %}
